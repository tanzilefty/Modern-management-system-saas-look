<div class="module-container">
    <div class="module-header">
        <div>
            <h2>Student Management</h2>
            <p>View and manage all enrolled students.</p>
        </div>
        <button class="btn-primary" onclick="StudentModule.openModal()">+ Add New Student</button>
    </div>

    <div class="table-controls">
        <input type="text" id="studentSearch" placeholder="Search by name or ID..." oninput="StudentModule.filter()">
        <select id="filterDept" onchange="StudentModule.filter()">
            <option value="">All Departments</option>
            <option value="CS">Computer Science</option>
            <option value="Math">Mathematics</option>
            <option value="Physics">Physics</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>GPA</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>
    </div>
</div>

<div id="studentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Student</h3>
            <span class="close" onclick="StudentModule.closeModal()">&times;</span>
        </div>
        <form id="studentForm">
            <input type="hidden" id="studentId">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="sName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="sEmail" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="sDept">
                        <option value="CS">Computer Science</option>
                        <option value="Math">Mathematics</option>
                        <option value="Physics">Physics</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Initial GPA</label>
                    <input type="number" step="0.1" id="sGPA" value="0.0">
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Save Student</button>
        </form>
    </div>
</div>
