<div class="module-container">
    <div class="module-header">
        <div>
            <h2>Account Settings</h2>
            <p>Manage your profile, preferences, and security settings.</p>
        </div>
    </div>

    <div class="settings-layout">
        <section class="card settings-card">
            <div class="settings-section-header">
                <h3>User Profile</h3>
                <p>Update your personal information and public profile.</p>
            </div>
            
            <form id="profileForm" class="settings-form">
                <div class="avatar-upload-container">
                    <div class="avatar-large" id="profileDisplay">A</div>
                    <div class="upload-controls">
                        <label for="avatarInput" class="btn-secondary">Change Avatar</label>
                        <input type="file" id="avatarInput" hidden accept="image/*">
                        <p class="input-hint">JPG or PNG. Max 1MB.</p>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="setUserName" value="Admin User">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="setUserEmail" value="admin@sims.com">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save Profile Changes</button>
            </form>
        </section>

        <div class="settings-sidebar-grid">
            <section class="card settings-card">
                <h3>Appearance</h3>
                <p class="input-hint">Customize how SIMS looks on your device.</p>
                <div class="setting-row">
                    <span>Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </section>

            <section class="card settings-card">
                <h3>Security</h3>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button class="btn-secondary" style="width: 100%;">Update Password</button>
            </section>
        </div>
    </div>
</div>
